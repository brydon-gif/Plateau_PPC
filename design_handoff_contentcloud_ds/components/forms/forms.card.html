<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--cc-white)}
  #root{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:18px 20px;align-items:start}
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  function findNs(name){for(const k in window){try{const v=window[k];if(v&&typeof v==='object'&&v[name])return v;}catch(e){}}return null;}
  const NS = findNs('Input') || {};
  const { Input } = NS;
  function Demo(){
    if(!Input) return React.createElement('div',{style:{color:'#D02807',fontFamily:'monospace'}},'Input not found');
    return (
      <React.Fragment>
        <Input label="Work email" placeholder="you@org.eu" defaultValue="" />
        <Input label="Organisation" placeholder="EU institution or company" />
        <Input label="Seats" invalid hint="This field is required" defaultValue="" />
        <div style={{gridColumn:'1 / -1'}}>
          <Input label="How can we help?" multiline rows={3} placeholder="Tell us about your use case…" />
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
