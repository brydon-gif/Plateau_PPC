<!-- @dsCard group="Components" viewport="700x210" name="Feature list" subtitle="Red checkmark benefits" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--cc-white)}
  #root{padding:24px}
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  function findNs(name){for(const k in window){try{const v=window[k];if(v&&typeof v==='object'&&v[name])return v;}catch(e){}}return null;}
  const NS = findNs('FeatureList') || {};
  const { FeatureList } = NS;
  function Demo(){
    if(!FeatureList) return React.createElement('div',{style:{color:'#D02807',fontFamily:'monospace'}},'FeatureList not found');
    return (
      <FeatureList columns={2} items={[
        'Natural language understanding and multilingual support',
        'Full citation support',
        'Seamless integration with Drupal websites',
        'Guardrails and secure, private data handling',
        'GDPR and EU AI Act compliance',
        'Deployed in EU cloud or on-premise',
      ]} />
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
