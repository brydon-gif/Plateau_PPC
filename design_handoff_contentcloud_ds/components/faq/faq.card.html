<!-- @dsCard group="Components" viewport="700x260" name="FAQ accordion" subtitle="Expandable rows" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--cc-gray-50)}
  #root{padding:22px}
  .panel{background:var(--cc-white);border:1px solid var(--border-subtle);border-radius:var(--radius-xl);padding:6px 22px}
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  function findNs(name){for(const k in window){try{const v=window[k];if(v&&typeof v==='object'&&v[name])return v;}catch(e){}}return null;}
  const NS = findNs('FaqItem') || {};
  const { FaqItem } = NS;
  function Demo(){
    if(!FaqItem) return React.createElement('div',{style:{color:'#D02807',fontFamily:'monospace'}},'FaqItem not found');
    return (
      <div className="panel">
        <FaqItem question="Which sources are supported?" defaultOpen>
          PDFs and HTML content are supported at launch, including Drupal-backed sources and REST integrations.
        </FaqItem>
        <FaqItem question="Can we restrict topics?">
          Yes. Scope CCBot to specific publications or approved content domains, with allow/deny lists.
        </FaqItem>
        <FaqItem question="How do languages work?">
          Cross-lingual retrieval; answers in English, French, German, Spanish and Dutch by default.
        </FaqItem>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
