<!-- @dsCard group="Components" viewport="820x300" name="Comparison table" subtitle="Brand column highlighted" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--cc-white)}
  #root{padding:22px}
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  function findNs(name){for(const k in window){try{const v=window[k];if(v&&typeof v==='object'&&v[name])return v;}catch(e){}}return null;}
  const NS = findNs('ComparisonTable') || {};
  const { ComparisonTable } = NS;
  function Demo(){
    if(!ComparisonTable) return React.createElement('div',{style:{color:'#D02807',fontFamily:'monospace'}},'ComparisonTable not found');
    return (
      <ComparisonTable
        columns={['ContentCloud','Generic AI Chatbots','Traditional Search']}
        rows={[
          {feature:'Source Citations', values:['Always, page-level','Rarely, inaccurate','Links only']},
          {feature:'Hallucination Risk', values:['Eliminated','High','None, manual']},
          {feature:'EU Data Residency', values:['✓ Yes','Usually US-based','Depends']},
          {feature:'Multilingual', values:['Native cross-lingual','Translation-based','Language-specific']},
        ]} />
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
