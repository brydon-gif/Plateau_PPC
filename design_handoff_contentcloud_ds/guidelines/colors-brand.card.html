<!-- @dsCard group="Colors" viewport="700x150" name="Brand" subtitle="Ink + a single hot red" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--cc-white)}
  .row{display:flex;gap:14px;padding:20px}
  .sw{flex:1;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border-subtle)}
  .chip{height:74px}
  .meta{padding:8px 10px}
  .name{font-family:var(--font-heading);font-weight:600;font-size:13px;color:var(--cc-ink)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);letter-spacing:.02em}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--cc-ink)"></div><div class="meta"><div class="name">Ink</div><div class="hex">#121827</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cc-red)"></div><div class="meta"><div class="name">Brand Red</div><div class="hex">#D02807</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cc-red-hover)"></div><div class="meta"><div class="name">Red / pressed</div><div class="hex">#B01F02</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cc-red-tint)"></div><div class="meta"><div class="name">Red tint</div><div class="hex">#FDF0EC</div></div></div>
  </div>
</body></html>
