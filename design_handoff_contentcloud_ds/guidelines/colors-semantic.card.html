<!-- @dsCard group="Colors" viewport="700x150" name="Semantic status" subtitle="Success / warning / danger — used sparingly" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--cc-white)}
  .row{display:flex;gap:14px;padding:20px}
  .sw{flex:1;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border-subtle)}
  .chip{height:52px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}
  .tint{height:22px}
  .meta{padding:8px 10px}
  .name{font-family:var(--font-heading);font-weight:600;font-size:13px;color:var(--cc-ink)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--cc-success)">✓</div><div class="tint" style="background:var(--cc-success-tint)"></div><div class="meta"><div class="name">Success</div><div class="hex">#1F8A5B</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cc-warning)">!</div><div class="tint" style="background:var(--cc-warning-tint)"></div><div class="meta"><div class="name">Warning</div><div class="hex">#B45309</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cc-danger)">✕</div><div class="tint" style="background:var(--cc-danger-tint)"></div><div class="meta"><div class="name">Danger</div><div class="hex">#D02807</div></div></div>
  </div>
</body></html>
