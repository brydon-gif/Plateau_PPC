<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base unit" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--cc-white)}
  .wrap{padding:22px 26px;display:flex;align-items:flex-end;gap:16px}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--cc-red);width:22px;border-radius:3px}
  .n{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
  .u{font-family:var(--font-heading);font-size:11px;font-weight:600;color:var(--cc-ink)}
</style></head>
<body>
  <div class="wrap">
    <div class="col"><div class="bar" style="height:8px"></div><div class="u">1</div><div class="n">4</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="u">2</div><div class="n">8</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="u">3</div><div class="n">12</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="u">4</div><div class="n">16</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="u">6</div><div class="n">24</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="u">8</div><div class="n">32</div></div>
    <div class="col"><div class="bar" style="height:80px"></div><div class="u">10</div><div class="n">40</div></div>
    <div class="col"><div class="bar" style="height:96px"></div><div class="u">12</div><div class="n">48</div></div>
  </div>
</body></html>
