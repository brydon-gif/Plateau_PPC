<!-- @dsCard group="Type" viewport="700x220" name="Jura — display & headings" subtitle="Geometric sans, set tight for titles" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--cc-white);color:var(--cc-ink)}
  .wrap{padding:22px 26px;display:flex;flex-direction:column;gap:14px}
  .line{display:flex;align-items:baseline;gap:16px}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);width:120px;flex:none}
  .h{font-family:var(--font-heading);line-height:var(--lh-heading);letter-spacing:var(--ls-tight);margin:0}
  .red{color:var(--cc-red)}
</style></head>
<body>
  <div class="wrap">
    <div class="line"><span class="tag">display · 500</span><p class="h" style="font-size:44px;font-weight:500;line-height:1.05">Secure and <span class="red">compliant</span></p></div>
    <div class="line"><span class="tag">h2 · 500</span><p class="h" style="font-size:34px;font-weight:500">One ecosystem, two products</p></div>
    <div class="line"><span class="tag">h3 · 600</span><p class="h" style="font-size:22px;font-weight:600">Meet CCBot</p></div>
    <div class="line"><span class="tag">h4 · 600</span><p class="h" style="font-size:18px;font-weight:600">Reduce Support Workload</p></div>
  </div>
</body></html>
