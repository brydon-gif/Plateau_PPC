<!-- @dsCard group="Colors" viewport="700x160" name="Neutrals" subtitle="Cool gray ramp for text, borders & surfaces" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--cc-white)}
  .wrap{padding:20px}
  .row{display:flex;gap:8px}
  .sw{flex:1}
  .chip{height:56px;border-radius:8px;border:1px solid var(--border-subtle)}
  .name{font-family:var(--font-heading);font-weight:600;font-size:11px;color:var(--cc-ink);margin-top:6px}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
</style></head>
<body>
  <div class="wrap"><div class="row">
    <div class="sw"><div class="chip" style="background:var(--cc-gray-50)"></div><div class="name">50</div><div class="hex">F9FAFB</div></div>
    <div class="sw"><div class="chip" style="background:var(--cc-gray-100)"></div><div class="name">100</div><div class="hex">F3F4F6</div></div>
    <div class="sw"><div class="chip" style="background:var(--cc-gray-200)"></div><div class="name">200</div><div class="hex">E5E7EB</div></div>
    <div class="sw"><div class="chip" style="background:var(--cc-gray-300)"></div><div class="name">300</div><div class="hex">D1D5DB</div></div>
    <div class="sw"><div class="chip" style="background:var(--cc-gray-400)"></div><div class="name">400</div><div class="hex">9CA3AF</div></div>
    <div class="sw"><div class="chip" style="background:var(--cc-gray-500)"></div><div class="name">500</div><div class="hex">6B7280</div></div>
    <div class="sw"><div class="chip" style="background:var(--cc-gray-700)"></div><div class="name">700</div><div class="hex">374151</div></div>
    <div class="sw"><div class="chip" style="background:var(--cc-gray-900)"></div><div class="name">900</div><div class="hex">111827</div></div>
  </div></div>
</body></html>
