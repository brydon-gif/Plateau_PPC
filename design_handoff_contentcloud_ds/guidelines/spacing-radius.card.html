<!-- @dsCard group="Spacing" viewport="700x170" name="Radius & elevation" subtitle="Modest corners, soft low shadows" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--cc-gray-50)}
  .wrap{padding:24px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .box{width:96px;height:64px;background:var(--cc-white);border:1px solid var(--border-subtle);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px}
  .l{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
  .sep{width:1px;height:64px;background:var(--border-subtle)}
</style></head>
<body>
  <div class="wrap">
    <div class="box" style="border-radius:var(--radius-sm)"><span class="l">sm · 6</span></div>
    <div class="box" style="border-radius:var(--radius-md)"><span class="l">md · 8</span></div>
    <div class="box" style="border-radius:var(--radius-lg)"><span class="l">lg · 12</span></div>
    <div class="box" style="border-radius:var(--radius-xl)"><span class="l">xl · 16</span></div>
    <div class="sep"></div>
    <div class="box" style="border-radius:12px;border:none;box-shadow:var(--shadow-sm)"><span class="l">shadow sm</span></div>
    <div class="box" style="border-radius:12px;border:none;box-shadow:var(--shadow-md)"><span class="l">shadow md</span></div>
    <div class="box" style="border-radius:12px;border:none;box-shadow:var(--shadow-lg)"><span class="l">shadow lg</span></div>
  </div>
</body></html>
